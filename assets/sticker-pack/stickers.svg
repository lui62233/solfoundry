<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- SolFoundry Sticker Pack - 10 Unique Designs -->
  <!-- Sticker 1: Anvil Logo -->
  <rect x="10" y="10" width="150" height="150" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="3"/>
