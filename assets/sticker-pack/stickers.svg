  <text x="85" y="400" text-anchor="middle" fill="#10b981" font-size="40" font-family="Arial" font-weight="bold">T1</text>
  <text x="85" y="440" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial">Open Bounty</text>
  
  <!-- Sticker 8: T2 Bounty -->
  <rect x="170" y="330" width="150" height="150" rx="10" fill="#0f172a" stroke="#ec4899" stroke-width="3"/>
  <text x="245" y="400" text-anchor="middle" fill="#ec4899" font-size="40" font-family="Arial" font-weight="bold">T2</text>
