  <text x="85" y="120" text-anchor="middle" fill="#ffffff" font-size="16" font-family="Arial">SolFoundry</text>
  
  <!-- Sticker 2: Forge Fire -->
  <rect x="170" y="10" width="150" height="150" rx="10" fill="#0f172a" stroke="#ec4899" stroke-width="3"/>
