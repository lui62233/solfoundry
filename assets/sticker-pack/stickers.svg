  <!-- Sticker 5: AI Review -->
  <rect x="170" y="170" width="150" height="150" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="3"/>
  <text x="245" y="240" text-anchor="middle" fill="#10b981" font-size="60" font-family="Arial">🤖</text>
